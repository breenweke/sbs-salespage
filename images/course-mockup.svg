<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" fill="none">
  <!-- Laptop base shadow -->
  <ellipse cx="260" cy="328" rx="200" ry="10" fill="#000" opacity=".06"/>

  <!-- Laptop base -->
  <path d="M100 310 L420 310 L440 330 L80 330 Z" fill="#d4d0ca" rx="4"/>
  <rect x="80" y="326" width="360" height="6" rx="3" fill="#cfc8bd"/>

  <!-- Laptop screen bezel -->
  <rect x="110" y="40" width="300" height="274" rx="10" fill="#2a2a2a"/>

  <!-- Screen -->
  <rect x="120" y="50" width="280" height="250" rx="4" fill="#fdfbf7"/>

  <!-- Screen content: Course page -->
  <!-- Top gradient bar -->
  <defs>
    <linearGradient id="screenBar" x1="120" y1="50" x2="400" y2="50">
      <stop offset="0%" stop-color="#6b66e9"/>
      <stop offset="100%" stop-color="#deff55"/>
    </linearGradient>
  </defs>
  <rect x="120" y="50" width="280" height="4" fill="url(#screenBar)"/>

  <!-- Logo area -->
  <rect x="220" y="64" width="80" height="8" rx="4" fill="#cfc8bd" opacity=".5"/>

  <!-- Course title -->
  <text x="260" y="95" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">The Self-Booking System</text>
  <text x="260" y="110" font-family="Georgia, serif" font-size="9" font-weight="600" fill="#6b66e9" text-anchor="middle" font-style="italic">Course</text>

  <!-- Divider -->
  <line x1="180" y1="120" x2="340" y2="120" stroke="#e4dfd7" stroke-width="0.8"/>

  <!-- Module list -->
  <!-- Module 1 -->
  <rect x="145" y="130" width="16" height="16" rx="8" fill="#deff55"/>
  <text x="153" y="142" font-family="system-ui" font-size="8" font-weight="700" fill="#1a1a1a" text-anchor="middle">1</text>
  <rect x="170" y="134" width="140" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- Module 2 -->
  <rect x="145" y="155" width="16" height="16" rx="8" fill="#deff55"/>
  <text x="153" y="167" font-family="system-ui" font-size="8" font-weight="700" fill="#1a1a1a" text-anchor="middle">2</text>
  <rect x="170" y="159" width="160" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- Module 3 -->
  <rect x="145" y="180" width="16" height="16" rx="8" fill="#deff55"/>
  <text x="153" y="192" font-family="system-ui" font-size="8" font-weight="700" fill="#1a1a1a" text-anchor="middle">3</text>
  <rect x="170" y="184" width="130" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- Module 4 -->
  <rect x="145" y="205" width="16" height="16" rx="8" fill="#6b66e9" opacity=".15"/>
  <text x="153" y="217" font-family="system-ui" font-size="8" font-weight="700" fill="#6b66e9" text-anchor="middle">4</text>
  <rect x="170" y="209" width="150" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- Module 5 -->
  <rect x="145" y="230" width="16" height="16" rx="8" fill="#6b66e9" opacity=".15"/>
  <text x="153" y="242" font-family="system-ui" font-size="8" font-weight="700" fill="#6b66e9" text-anchor="middle">5</text>
  <rect x="170" y="234" width="120" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- Module 6 -->
  <rect x="145" y="255" width="16" height="16" rx="8" fill="#6b66e9" opacity=".15"/>
  <text x="153" y="267" font-family="system-ui" font-size="8" font-weight="700" fill="#6b66e9" text-anchor="middle">6</text>
  <rect x="170" y="259" width="145" height="7" rx="3.5" fill="#cfc8bd" opacity=".45"/>

  <!-- CTA button -->
  <rect x="175" y="278" width="170" height="16" rx="8" fill="#deff55"/>
  <text x="260" y="289" font-family="system-ui" font-size="7" font-weight="700" fill="#1a1a1a" text-anchor="middle">Get the Course</text>

  <!-- Camera dot -->
  <circle cx="260" cy="45" r="2" fill="#3a3a3a"/>
</svg>
